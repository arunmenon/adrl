# Backend selection per router role (WS0). Code never imports a framework —
# it asks backends.for_role(<role>) and gets whatever this file says.
#
# adapter: lattice | openai_compat | ollama
#   lattice       — the in-house wrapper over serving frameworks (shim pending;
#                   until wired it fail-safe-abstains, so put a fallback after it)
#   openai_compat — /v1/chat/completions + /v1/embeddings: llama.cpp server,
#                   mlx_lm.server, vLLM, ollama's /v1 — anything OpenAI-shaped
#   ollama        — ollama-native /api/chat + /api/embed
#
# To move a role to llama.cpp or MLX: change its adapter to openai_compat and
# point base_url at that server. No code change.

# Testing default (user decision): the OpenAI-compat protocol — the same
# interface llama.cpp / mlx_lm.server speak — served today by ollama's /v1.
classifier:
  adapter: openai_compat
  model: qwen2.5:3b-instruct
  base_url: http://localhost:11434
  timeout: 30.0

embedder:
  adapter: openai_compat
  model: nomic-embed-text        # ~270MB local embedding model
  base_url: http://localhost:11434
  timeout: 15.0

local_small:
  adapter: ollama
  model: llama3.2:latest
  timeout: 45.0

local_code:
  adapter: ollama
  model: qwen2.5:7b-instruct-q4_K_M
  timeout: 90.0
