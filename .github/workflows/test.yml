name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile sources
        run: PYTHONPATH=src python -m compileall -q src tests
      - name: Validate ADR taxonomy
        run: python tools/check_adr_taxonomy.py
      - name: Validate readiness score artifacts
        run: python tools/check_readiness_score.py
      - name: Validate PR architecture classification
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python tools/check_adr_taxonomy.py --pr-body-env PR_BODY
      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests -q
